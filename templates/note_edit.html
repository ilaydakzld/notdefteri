<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Not Düzenle</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 {
            color: #667eea;
            margin-bottom: 30px;
            font-size: 2rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
        }

        input[type="text"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e1e1;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            outline: none;
        }

        textarea {
            height: 150px;
            resize: vertical;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button, .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            font-size: 1rem;
            flex: 1;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        button:hover, .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
        }

        .btn-secondary:hover {
            box-shadow: 0 5px 15px rgba(108, 117, 125, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-edit"></i> Not Düzenle</h1>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="title">Konu Başlığı:</label>
                <input type="text" id="title" name="title" value="{{ note.title }}" required>
            </div>

            <div class="form-group">
                <label for="content">İçerik:</label>
                <textarea id="content" name="content" required>{{ note.content }}</textarea>
            </div>

            <div class="form-group">
                <label for="category">Kategori:</label>
                <select id="category" name="category">
                    {% for value, label in Note.CATEGORY_CHOICES %}
                        <option value="{{ value }}" {% if note.category == value %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="priority">Öncelik:</label>
                <select id="priority" name="priority">
                    {% for value, label in Note.PRIORITY_CHOICES %}
                        <option value="{{ value }}" {% if note.priority == value %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="due_date">Bitiş Tarihi:</label>
                <input type="date" id="due_date" name="due_date" value="{{ note.due_date|date:'Y-m-d' }}">
            </div>

            <div class="form-group">
                <label for="tags">Etiketler (virgülle ayırın):</label>
                <input type="text" id="tags" name="tags" value="{{ note.tags }}" placeholder="örnek: iş, acil, proje">
            </div>

            <div class="button-group">
                <button type="submit"><i class="fas fa-save"></i> Kaydet</button>
                <a href="{% url 'notehome' %}" class="btn btn-secondary"><i class="fas fa-times"></i> İptal</a>
            </div>
        </form>
    </div>
</body>
</html>
