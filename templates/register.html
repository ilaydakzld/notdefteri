<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol - Not Defteri</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --dark: #0f172a;
            --light: #f8fafc;
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.4);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.08);
            --glass-blur: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0e7ff 0%, #fae8ff 50%, #f1f5f9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .register-container {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .logo {
            margin-bottom: 20px;
            display: inline-block;
            transition: transform 0.3s;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .logo i {
            font-size: 3rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h1 {
            color: var(--dark);
            font-weight: 800;
            margin-bottom: 24px;
            font-size: 1.8rem;
            letter-spacing: -0.5px;
        }

        /* Register Tabs */
        .register-tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.05);
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 24px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: none;
            font-weight: 600;
            color: #64748b;
            cursor: pointer;
            border-radius: 8px;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: white;
            color: var(--primary);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .form-group {
            margin-bottom: 18px;
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 0.8rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            font-size: 0.95rem;
            color: var(--dark);
            outline: none;
            transition: all 0.2s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        button.btn-submit {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-size: 1rem;
            width: 100%;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.25);
        }

        button.btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.35);
        }

        .register-footer {
            margin-top: 24px;
            color: #64748b;
            font-size: 0.9rem;
        }

        .register-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .register-footer a:hover {
            color: var(--secondary);
            text-decoration: underline;
        }

        .btn-features {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 15px;
            padding: 8px 18px;
            border: 1.5px solid var(--primary);
            border-radius: 20px;
            color: var(--primary) !important;
            font-size: 0.8rem;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.2s;
        }
        
        .btn-features:hover {
            background: var(--primary);
            color: white !important;
            box-shadow: 0 4px 10px rgba(99, 102, 241, 0.15);
        }

        /* Slide Animation for Form Fields toggle */
        .register-fields {
            animation: slideFade 0.3s ease;
        }

        @keyframes slideFade {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <a href="{% url 'landing' %}">
            <div class="logo">
                <i class="fas fa-sticky-note"></i>
            </div>
        </a>
        <h1>Yeni Hesap Oluştur</h1>

        <!-- Register Method Tabs -->
        <div class="register-tabs">
            <button class="tab-btn active" id="tab-email" onclick="setRegisterMethod('email')">E-posta ile</button>
            <button class="tab-btn" id="tab-phone" onclick="setRegisterMethod('phone')">Telefon ile</button>
        </div>

        <form method="post" action="{% url 'notehome' %}">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="username">Kullanıcı Adı</label>
                <input type="text" id="username" name="username" required placeholder="Kullanıcı adınızı belirleyin...">
            </div>

            <!-- E-mail Fields Container -->
            <div id="email-fields-container" class="register-fields">
                <div class="form-group">
                    <label for="email">E-posta Adresi</label>
                    <input type="email" id="email" name="email" placeholder="örnek@eposta.com">
                </div>
            </div>

            <!-- Phone Fields Container (hidden by default) -->
            <div id="phone-fields-container" class="register-fields" style="display: none;">
                <div class="form-group">
                    <label for="phone">Telefon Numarası</label>
                    <input type="tel" id="phone" name="phone" placeholder="0555 555 55 55">
                </div>
            </div>

            <div class="form-group">
                <label for="password">Şifre</label>
                <input type="password" id="password" name="password" required placeholder="Güçlü bir şifre belirleyin...">
            </div>

            <!-- Hidden input indicating chosen register method -->
            <input type="hidden" id="register_method" name="register_method" value="email">

            <button type="submit" class="btn-submit"><i class="fas fa-user-plus"></i> Kayıt Ol</button>
        </form>

        <div class="register-footer">
            <p>Zaten hesabınız var mı? <a href="{% url 'login' %}">Giriş Yap</a></p>
            <p style="margin-top: 12px;">
                <a href="{% url 'landing' %}#features" class="btn-features">
                    <i class="fas fa-info-circle"></i> Özellikleri İncele
                </a>
            </p>
        </div>
    </div>

    <script>
        function setRegisterMethod(method) {
            // Update inputs and active tab style
            const tabEmail = document.getElementById('tab-email');
            const tabPhone = document.getElementById('tab-phone');
            const emailContainer = document.getElementById('email-fields-container');
            const phoneContainer = document.getElementById('phone-fields-container');
            const methodInput = document.getElementById('register_method');
            const emailInput = document.getElementById('email');
            const phoneInput = document.getElementById('phone');

            methodInput.value = method;

            if (method === 'email') {
                tabEmail.classList.add('active');
                tabPhone.classList.remove('active');
                emailContainer.style.display = 'block';
                phoneContainer.style.display = 'none';
                
                emailInput.setAttribute('required', 'required');
                phoneInput.removeAttribute('required');
            } else {
                tabEmail.classList.remove('active');
                tabPhone.classList.add('active');
                emailContainer.style.display = 'none';
                phoneContainer.style.display = 'block';
                
                phoneInput.setAttribute('required', 'required');
                emailInput.removeAttribute('required');
            }
        }

        // Initialize default constraints
        document.addEventListener('DOMContentLoaded', () => {
            setRegisterMethod('email');
        });
    </script>
</body>
</html>
